<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>YouTube to Markdown | YouTube 자막을 Markdown 파일로 변환</title>
    <meta name="description" content="YouTube URL을 입력하면 영상 자막과 트랜스크립트를 깔끔한 Markdown 파일로 변환합니다. 자동 언어 감지, 타임스탬프, 메타데이터, 다운로드를 지원합니다.">
    <meta name="keywords" content="YouTube to Markdown, YouTube 자막 추출, 유튜브 자막 다운로드, YouTube transcript, markdown converter, 자막 마크다운 변환, 영상 요약 준비">
    <meta name="author" content="DeclanJeon">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="application-name" content="Y2MD">
    <meta name="theme-color" content="#202124">
    <meta name="color-scheme" content="dark light">
    <meta name="format-detection" content="telephone=no">

    <link rel="canonical" href="https://y2md.ponslink.com/">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon-180.png" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="YouTube to Markdown">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:url" content="https://y2md.ponslink.com/">
    <meta property="og:title" content="YouTube to Markdown | YouTube 자막을 Markdown 파일로 변환">
    <meta property="og:description" content="YouTube URL 하나로 자막을 추출하고 타임스탬프가 포함된 Markdown 파일을 다운로드하세요.">
    <meta property="og:image" content="https://y2md.ponslink.com/og-image.png">
    <meta property="og:image:secure_url" content="https://y2md.ponslink.com/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="YouTube to Markdown - YouTube transcript to clean Markdown">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="YouTube to Markdown">
    <meta name="twitter:description" content="YouTube 영상 자막을 깔끔한 Markdown 파일로 변환합니다.">
    <meta name="twitter:image" content="https://y2md.ponslink.com/og-image.png">
    <meta name="twitter:image:alt" content="YouTube to Markdown social preview">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebApplication",
          "@id": "https://y2md.ponslink.com/#webapp",
          "name": "YouTube to Markdown",
          "alternateName": ["Y2MD", "YouTube → MD"],
          "url": "https://y2md.ponslink.com/",
          "applicationCategory": "UtilitiesApplication",
          "operatingSystem": "Web",
          "inLanguage": ["ko", "en"],
          "description": "YouTube URL을 입력하면 영상 자막과 트랜스크립트를 Markdown 파일로 변환하는 웹 애플리케이션입니다.",
          "image": "https://y2md.ponslink.com/og-image.png",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "featureList": [
            "YouTube transcript extraction",
            "Automatic caption language detection",
            "Timestamped Markdown output",
            "Markdown file download",
            "Clipboard copy"
          ],
          "creator": {
            "@type": "Person",
            "name": "DeclanJeon",
            "url": "https://github.com/DeclanJeon"
          },
          "sameAs": [
            "https://github.com/DeclanJeon/youtube-to-md"
          ]
        },
        {
          "@type": "FAQPage",
          "@id": "https://y2md.ponslink.com/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "YouTube to Markdown은 무엇인가요?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "YouTube URL을 입력하면 해당 영상의 자막 또는 트랜스크립트를 추출해 Markdown 파일로 변환하는 웹 도구입니다."
              }
            },
            {
              "@type": "Question",
              "name": "YouTube API 키가 필요한가요?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "기본 사용에는 필요하지 않습니다. 다만 클라우드 환경에서 안정성을 높이려면 YouTube Data API 키를 선택적으로 설정할 수 있습니다."
              }
            },
            {
              "@type": "Question",
              "name": "자막이 없는 영상도 변환되나요?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "공개 자막 또는 자동 자막이 있는 영상에서 가장 잘 동작합니다. 자막이 전혀 없는 영상은 변환할 수 없습니다."
              }
            }
          ]
        },
        {
          "@type": "HowTo",
          "@id": "https://y2md.ponslink.com/#howto",
          "name": "YouTube 영상을 Markdown으로 변환하는 방법",
          "step": [
            {
              "@type": "HowToStep",
              "name": "YouTube URL 입력",
              "text": "변환할 공개 YouTube 영상 URL을 입력창에 붙여넣습니다."
            },
            {
              "@type": "HowToStep",
              "name": "변환 실행",
              "text": "Markdown으로 변환 버튼을 누르면 자막 추출과 Markdown 포맷팅이 진행됩니다."
            },
            {
              "@type": "HowToStep",
              "name": "Markdown 다운로드",
              "text": "변환 완료 후 Markdown 파일을 다운로드하거나 클립보드로 복사합니다."
            }
          ]
        }
      ]
    }
    </script>
</head>
<body>
    <div class="main-container">
        <div class="logo-section">
            <h1 class="logo">YouTube<span class="logo-arrow">→</span>MD</h1>
        </div>

        <div class="search-section">
            <div class="search-box">
                <div class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </div>
                <input
                    type="text"
                    id="url-input"
                    placeholder="YouTube URL을 입력하세요"
                    aria-label="YouTube URL"
                    autocomplete="off"
                    spellcheck="false"
                >
                <button id="clear-btn" class="clear-btn" hidden>&times;</button>
            </div>
            <div id="url-error" class="error-message" role="alert" aria-live="polite"></div>
        </div>

        <div class="button-section">
            <button id="convert-btn" class="btn-primary" disabled>Markdown으로 변환</button>
            <button id="options-toggle" class="btn-secondary">옵션</button>
        </div>

        <div id="options-panel" class="options-panel" hidden>
            <div class="options-row">
                <label class="option-item">
                    <input type="checkbox" id="opt-timestamps" checked>
                    <span>타임스탬프 포함</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="opt-metadata" checked>
                    <span>메타데이터 포함</span>
                </label>
                <label class="option-item">
                    <select id="opt-language">
                        <option value="">자동 감지</option>
                        <option value="ko">한국어</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="zh">中文</option>
                    </select>
                </label>
            </div>
        </div>

        <!-- Progress Section -->
        <div id="progress-section" class="progress-section" hidden>
            <div class="progress-card">
                <div class="progress-header">
                    <div class="progress-title">
                        <span id="progress-icon" class="progress-icon">⏳</span>
                        <span id="progress-label">준비 중...</span>
                    </div>
                    <div class="progress-meta">
                        <span id="progress-percent">0%</span>
                        <span id="progress-eta" class="progress-eta"></span>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div class="progress-steps">
                    <div class="progress-step" id="step-url">
                        <span class="step-dot"></span>
                        <span class="step-text">URL 분석</span>
                    </div>
                    <div class="progress-step" id="step-meta">
                        <span class="step-dot"></span>
                        <span class="step-text">영상 정보</span>
                    </div>
                    <div class="progress-step" id="step-transcript">
                        <span class="step-dot"></span>
                        <span class="step-text">자막 추출</span>
                    </div>
                    <div class="progress-step" id="step-format">
                        <span class="step-dot"></span>
                        <span class="step-text">Markdown 변환</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="result" class="result-section" hidden>
            <div class="result-card">
                <div class="result-header">
                    <span class="success-icon">✅</span>
                    <span>변환 완료</span>
                </div>
                <div class="result-meta">
                    <span id="result-title"></span>
                    <span id="result-channel"></span>
                    <span id="result-stats"></span>
                </div>
                <div class="result-actions">
                    <button id="download-btn" class="btn-action">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        다운로드
                    </button>
                    <button id="copy-btn" class="btn-action">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        복사
                    </button>
                    <button id="new-btn" class="btn-action btn-new">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        새로 변환
                    </button>
                </div>
                <details class="preview-details">
                    <summary>미리보기</summary>
                    <pre id="preview" class="preview-content"></pre>
                </details>
            </div>
        </div>

        <div id="error-result" class="error-section" hidden>
            <div class="error-card">
                <span class="error-icon">❌</span>
                <span id="error-message"></span>
                <button id="retry-btn" class="btn-secondary">다시 시도</button>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <span>YouTube-to-Markdown</span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
